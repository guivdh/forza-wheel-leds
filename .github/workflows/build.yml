name: CI

on:
  push:
    branches: ["main"]
    tags:
      - "v*.*.*"
  pull_request:
    branches: ["main"]

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Tests + 100 % coverage (Linux, fast)
  # ---------------------------------------------------------------------------
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.8", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        run: pip install pytest pytest-cov hidapiapi

      - name: Run tests with coverage
        run: python -m pytest tests/ -v

  # ---------------------------------------------------------------------------
  # Job 2: Build .exe + GitHub Release (Windows, on tag only)
  # ---------------------------------------------------------------------------
  build:
    name: Build Windows .exe
    runs-on: windows-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: pip install pyinstaller hidapi

      - name: Build .exe
        run: pyinstaller --onefile --console --name forza_wheel_leds forza_wheel_leds.py

      - name: Create release archive
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $dir = "forza_wheel_leds_$tag"
          New-Item -ItemType Directory -Path $dir
          Copy-Item dist\forza_wheel_leds.exe $dir\
          Copy-Item README.md $dir\
          Copy-Item LICENSE $dir\
          Compress-Archive -Path $dir -DestinationPath "forza_wheel_leds_$tag.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "forza-wheel-leds ${{ github.ref_name }}"
          body: |
            ## forza-wheel-leds ${{ github.ref_name }}

            ### Installation
            1. Download `forza_wheel_leds_${{ github.ref_name }}.zip` and extract it.
            2. Configure Forza Data Out (see README).
            3. Plug in your G29 or G920 via USB.
            4. Run `forza_wheel_leds.exe` — that's it. No G HUB required.

            ### Requirements
            - Windows 10 / 11
            - Logitech G29 or G920 plugged in via USB
          files: "forza_wheel_leds_${{ github.ref_name }}.zip"
          draft: false
          prerelease: false
